<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>商品详情 - 马尾食堂</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    /* ============================================================
       商品详情页样式
       ============================================================ */
    html, body { background: var(--bg-page); }
    .detail-page { padding-bottom: 0; }

    /* ----- 顶部导航双态 ----- */
    .detail-nav {
      position: fixed;
      top: 0; left: 50%;
      transform: translateX(-50%);
      width: 100%; max-width: 430px;
      z-index: 200;
      transition: background .25s ease, box-shadow .25s ease;
    }
    .detail-nav__placeholder { height: calc(44px + var(--safe-top)); }
    .detail-nav__bar {
      height: calc(44px + var(--safe-top));
      padding: var(--safe-top) 12px 0 12px;
      display: flex; align-items: center; gap: 10px;
    }
    .detail-nav__icon {
      width: 32px; height: 32px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
      background: rgba(0,0,0,.25);
      color: #fff;
      transition: all .25s;
      flex-shrink: 0;
      border: none;
    }
    .detail-nav__icon:active { transform: scale(0.92); }
    .detail-nav__search {
      flex: 1;
      height: 32px;
      border-radius: 16px;
      background: rgba(255,255,255,.92);
      display: none;
      align-items: center;
      padding: 0 14px;
      gap: 6px;
      color: var(--text-tertiary);
      font-size: 13px;
      cursor: pointer;
    }
    .detail-nav__search.show { display: flex; }
    .detail-nav__search:active { opacity: .8; }
    /* 透明态 */
    .detail-nav--top .detail-nav__icon { background: rgba(0,0,0,.25); color: #fff; }
    /* 白色态 */
    .detail-nav--solid {
      background: #fff;
      box-shadow: 0 2px 8px rgba(0,0,0,.04);
    }
    .detail-nav--solid .detail-nav__icon {
      background: transparent;
      color: var(--text-primary);
    }
    .detail-nav--solid .detail-nav__icon:active { background: var(--bg-muted); }

    .detail-tabs {
      display: none;
      height: 40px;
      align-items: center;
      justify-content: space-around;
      background: #fff;
      border-top: 1px solid var(--border-light);
    }
    .detail-tabs.show { display: flex; }
    .detail-tab {
      font-size: 14px;
      color: var(--text-secondary);
      position: relative;
      height: 100%;
      line-height: 40px;
      cursor: pointer;
      padding: 0 14px;
    }
    .detail-tab.active { color: var(--primary); font-weight: 600; }
    .detail-tab.active::after {
      content: ''; position: absolute;
      left: 50%; bottom: 6px;
      transform: translateX(-50%);
      width: 22px; height: 2px;
      background: var(--primary);
      border-radius: 2px;
    }

    /* ----- 主体滚动区 ----- */
    .detail-body {
      background: var(--bg-page);
      position: relative;
    }
    .detail-section { background: #fff; }
    .detail-section + .detail-section { margin-top: 8px; }

    /* Banner */
    .detail-banner {
      position: relative;
      width: 100%;
      height: 280px;
      background: #f4f4f4;
      overflow: hidden;
    }
    .detail-banner .slides {
      display: flex;
      height: 100%;
      transition: transform .5s cubic-bezier(.25,.46,.45,.94);
    }
    .detail-banner .slide {
      min-width: 100%;
      height: 100%;
      position: relative;
    }
    .detail-banner .slide img {
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
    }
    .detail-banner .dots {
      position: absolute;
      bottom: 14px; left: 50%;
      transform: translateX(-50%);
      display: flex; gap: 6px;
      z-index: 5;
    }
    .detail-banner .dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: rgba(255,255,255,.5);
      transition: all .3s;
      cursor: pointer;
      border: none;
    }
    .detail-banner .dot.active {
      width: 18px;
      background: #fff;
      border-radius: 3px;
    }

    /* 商品信息卡 */
    .detail-info-card {
      padding: 16px 14px 0;
      background: linear-gradient(180deg, #FFEFE5 0%, #fff 70%);
    }
    .detail-price-row {
      display: flex;
      align-items: baseline;
      gap: 10px;
      flex-wrap: wrap;
    }
    .detail-price-row .product-price { font-size: 28px; }
    .detail-price-row .product-price small { font-size: 16px; }
    .detail-sales {
      margin-left: auto;
      color: var(--text-tertiary);
      font-size: 12px;
    }
    .detail-name {
      font-size: 17px;
      line-height: 1.5;
      margin: 10px 0 12px;
      color: var(--text-primary);
      font-weight: 500;
    }
    .detail-name .tag { margin-left: 6px; vertical-align: middle; }

    /* 供应商 */
    .detail-supplier {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 0;
      border-top: 1px solid var(--border-light);
      margin-top: 10px;
      cursor: pointer;
    }
    .detail-supplier__icon {
      width: 40px; height: 40px;
      border-radius: 50%;
      background: var(--primary-light);
      color: var(--primary);
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }
    .detail-supplier__info { flex: 1; min-width: 0; }
    .detail-supplier__name { font-size: 14px; font-weight: 500; color: var(--text-primary); }
    .detail-supplier__meta { font-size: 11px; color: var(--text-tertiary); margin-top: 2px; }
    .detail-supplier__arrow { color: var(--text-tertiary); font-size: 12px; }

    /* 加购选择入口 */
    .detail-sku-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 0;
      border-top: 1px solid var(--border-light);
      cursor: pointer;
    }
    .detail-sku-row__label { color: var(--text-tertiary); font-size: 13px; flex-shrink: 0; }
    .detail-sku-row__value { flex: 1; font-size: 14px; color: var(--text-primary); }
    .detail-sku-row__arrow { color: var(--text-tertiary); font-size: 12px; }

    /* 商品参数 */
    .detail-params {
      border-top: 1px solid var(--border-light);
      padding: 12px 0 16px;
    }
    .detail-params__row {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      font-size: 13px;
      line-height: 1.7;
      padding: 4px 0;
    }
    .detail-params__row label {
      color: var(--text-tertiary);
      flex-shrink: 0;
      width: 64px;
    }
    .detail-params__row span { color: var(--text-primary); flex: 1; }

    /* 区块标题 */
    .section-title {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 14px 8px;
    }
    .section-title h3 {
      font-size: 15px; font-weight: 600; color: var(--text-primary);
      display: flex; align-items: center; gap: 6px;
    }
    .section-title h3::before {
      content: ''; width: 3px; height: 14px;
      background: var(--primary);
      border-radius: 2px;
    }
    .section-title h3 .review-count {
      font-size: 13px;
      color: var(--text-tertiary);
      font-weight: 400;
    }
    .section-title h3 .review-good-rate {
      font-size: 11px;
      padding: 1px 6px;
      background: #f6ffed;
      border: 1px solid #b7eb8f;
      border-radius: 10px;
      color: #52c41a;
      font-weight: 400;
    }
    .section-title .more {
      font-size: 12px; color: var(--text-tertiary);
      display: flex; align-items: center; gap: 2px;
      cursor: pointer;
    }

    /* 评价概览 */
    .detail-review-summary {
      display: flex; align-items: center;
      gap: 18px;
      padding: 4px 14px 14px;
    }
    .detail-review-summary__score {
      font-size: 32px;
      color: var(--error);
      font-weight: 700;
      line-height: 1;
    }
    .detail-review-summary__meta {
      flex: 1;
    }
    .detail-review-summary__stars {
      color: #FFB300;
      font-size: 14px;
      margin-top: 6px;
    }
    .detail-review-summary__stars i { margin-right: 1px; }
    .detail-review-summary__count {
      font-size: 12px;
      color: var(--text-tertiary);
      margin-top: 4px;
    }

    .detail-review-list { padding: 0 14px; }
    .detail-review-item {
      padding: 14px 0;
      border-bottom: 1px solid var(--border-light);
    }
    .detail-review-item:last-child { border-bottom: none; }
    .detail-review-item__head {
      display: flex; align-items: center; justify-content: space-between;
      font-size: 12px; color: var(--text-tertiary);
    }
    .detail-review-item__name { color: var(--text-primary); font-weight: 500; font-size: 13px; }
    .detail-review-item__stars {
      display: inline-flex;
      align-items: center;
      gap: 3px;
    }
    .detail-review-item__stars i { font-size: 12px; margin-left: 1px; }
    .detail-review-item__stars .star-label {
      font-size: 12px;
      font-weight: 500;
      margin-left: 2px;
    }
    .detail-review-item__stars .star-label--good { color: #52c41a; }
    .detail-review-item__stars .star-label--ok { color: #faad14; }
    .detail-review-item__stars .star-label--bad { color: #f5222d; }
    .detail-review-item__text {
      margin: 8px 0;
      font-size: 14px; line-height: 1.6;
      color: var(--text-primary);
    }
    .detail-review-item__imgs {
      display: flex; gap: 6px; flex-wrap: wrap;
      margin: 8px 0;
    }
    .detail-review-item__imgs img {
      width: 72px; height: 72px;
      border-radius: 8px;
      object-fit: cover;
      cursor: pointer;
      background: #f5f5f5;
    }
    .detail-review-item__imgs img:active { opacity: .8; }
    .detail-review-item__meta {
      font-size: 11px; color: var(--text-tertiary);
      display: flex; gap: 8px;
    }
    .detail-review-all {
      display: flex; align-items: center; justify-content: center;
      gap: 4px;
      padding: 14px;
      font-size: 14px;
      color: var(--primary);
      cursor: pointer;
    }
    .detail-review-all:active { opacity: .7; }

    /* 相似推荐 */
    .detail-rec-tabs {
      display: flex; gap: 8px;
    }
    .rec-tab {
      padding: 4px 12px;
      border-radius: 14px;
      font-size: 12px;
      background: var(--bg-muted);
      color: var(--text-secondary);
      cursor: pointer;
      transition: all .2s;
    }
    .rec-tab.active {
      background: var(--primary-light);
      color: var(--primary);
      font-weight: 600;
    }
    .recommend-grid { padding: 0 14px 14px; }

    /* 相似推荐 — 横向滑动+分页 */
    .rv-swipe-wrapper {
      overflow: hidden;
      padding: 0 14px 0;
    }
    .rv-swipe-track {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      scroll-snap-type: x mandatory;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      padding-bottom: 10px;
    }
    .rv-swipe-track::-webkit-scrollbar { display: none; }
    .rv-card {
      flex: 0 0 calc(33.333% - 6px);
      min-width: calc(33.333% - 6px);
      background: #fff;
      border-radius: var(--radius-md);
      overflow: hidden;
      scroll-snap-align: start;
      cursor: pointer;
    }
    .rv-card-img {
      width: 100%;
      aspect-ratio: 1;
      object-fit: cover;
      background: #f5f5f5;
    }
    .rv-card-body {
      padding: 6px 6px 8px;
    }
    .rv-card-title {
      font-size: 12px;
      color: var(--text-primary);
      line-height: 1.4;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      margin-bottom: 4px;
      height: 2.8em;
    }
    .rv-card-bottom {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .rv-card-price {
      font-size: 14px;
      font-weight: 700;
      color: var(--error, #f5222d);
    }
    .rv-card-rating {
      font-size: 10px;
      color: var(--text-tertiary);
    }
    .rv-card-rating i { color: #ffc107; margin-right: 1px; font-size: 10px; }
    .rv-pagination {
      display: flex;
      justify-content: center;
      gap: 5px;
      padding: 4px 14px 12px;
    }
    .rv-dot {
      width: 4px; height: 4px;
      border-radius: 50%;
      background: var(--border-color, #d9d9d9);
      transition: all .25s;
    }
    .rv-dot.active {
      width: 14px;
      border-radius: 3px;
      background: var(--primary, #1890FF);
    }

    /* 商品详情 */
    .detail-intro {
      padding: 0 14px 12px;
      font-size: 14px; line-height: 1.7;
      color: var(--text-secondary);
    }
    .detail-pics { padding: 0 14px 14px; }
    .detail-pics img {
      width: 100%; display: block;
      border-radius: 8px;
      margin-bottom: 8px;
      background: #f5f5f5;
    }

    /* 底部操作栏 */
    .detail-actionbar {
      position: fixed;
      bottom: 0; left: 50%;
      transform: translateX(-50%);
      width: 100%; max-width: 430px;
      background: #fff;
      z-index: 100;
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 8px calc(8px + var(--safe-bottom));
      border-top: 1px solid var(--border-color);
      box-shadow: 0 -4px 16px rgba(0,0,0,.04);
    }
    .detail-actionbar__icon {
      flex: 0 0 48px;
      display: flex; flex-direction: column;
      align-items: center; gap: 2px;
      font-size: 11px;
      color: var(--text-secondary);
      background: none;
      border: none;
      position: relative;
      padding: 4px 0;
    }
    .detail-actionbar__icon i { font-size: 18px; }
    .detail-actionbar__icon:active { transform: scale(0.92); }
    .detail-actionbar__icon .badge {
      position: absolute;
      top: 0; right: 6px;
      min-width: 16px; height: 16px;
      border-radius: 8px;
      font-size: 10px;
      font-weight: 600;
      background: var(--error);
      color: #fff;
      display: flex; align-items: center; justify-content: center;
      padding: 0 4px;
    }
    .detail-actionbar__btn {
      flex: 1;
      height: 40px;
      border-radius: 20px;
      font-size: 14px;
      font-weight: 600;
      color: #fff;
      border: none;
      display: flex; align-items: center; justify-content: center;
      transition: opacity .2s, transform .15s;
    }
    .detail-actionbar__btn:active { transform: scale(0.97); }
    .detail-actionbar__btn--cart {
      background: linear-gradient(90deg, #FFB94E 0%, #FF8A3D 100%);
    }
    .detail-actionbar__btn--buy {
      background: linear-gradient(135deg, #1890FF, #40a9ff);
    }

    /* 抽屉 / 弹层 */
    .drawer {
      position: fixed;
      left: 50%;
      bottom: 0;
      transform: translateX(-50%) translateY(100%);
      width: 100%; max-width: 430px;
      max-height: 80vh;
      background: #fff;
      border-radius: 18px 18px 0 0;
      z-index: 600;
      transition: transform .3s cubic-bezier(.34,1.56,.64,1);
      overflow: hidden;
      display: flex; flex-direction: column;
    }
    .drawer.show { transform: translateX(-50%) translateY(0); }
    .drawer__head {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px;
      border-bottom: 1px solid var(--border-light);
      font-size: 15px;
      font-weight: 600;
    }
    .drawer__head i { color: var(--text-tertiary); cursor: pointer; }
    .drawer__body {
      overflow-y: auto;
      padding: 14px;
      flex: 1;
    }
    .drawer__foot {
      padding: 12px 14px calc(12px + var(--safe-bottom));
      border-top: 1px solid var(--border-light);
    }

    /* 分享抽屉 */
    .share-drawer__list {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 18px 0;
      padding: 8px 0 16px;
    }
    .share-item {
      display: flex; flex-direction: column; align-items: center; gap: 6px;
      cursor: pointer;
    }
    .share-item:active { transform: scale(0.92); }
    .share-item i {
      width: 48px; height: 48px;
      border-radius: 50%;
      background: var(--primary-light);
      color: var(--primary);
      display: flex; align-items: center; justify-content: center;
      font-size: 22px;
    }
    .share-item span { font-size: 12px; color: var(--text-secondary); }
    .share-drawer__url {
      display: flex; align-items: center; gap: 8px;
      padding: 10px 12px;
      background: var(--bg-muted);
      border-radius: 10px;
      font-size: 12px;
      color: var(--text-secondary);
      margin-bottom: 10px;
      word-break: break-all;
    }
    .share-drawer__url button {
      flex-shrink: 0;
      background: var(--primary);
      color: #fff;
      font-size: 12px;
      padding: 4px 10px;
      border-radius: 14px;
    }

    /* SKU 抽屉 */
    .sku-drawer .sku-head {
      display: flex; align-items: flex-start; gap: 12px;
      margin-top: -34px;
      padding: 0 4px 14px;
    }
    .sku-drawer .sku-head img {
      width: 80px; height: 80px;
      border-radius: 10px;
      object-fit: cover;
      background: #f5f5f5;
      box-shadow: 0 4px 12px rgba(0,0,0,.1);
    }
    .sku-drawer .sku-head .sku-price {
      font-size: 22px;
      color: var(--error);
      font-weight: 700;
    }
    .sku-drawer .sku-head .sku-stock {
      font-size: 12px; color: var(--text-tertiary); margin-top: 4px;
    }
    .sku-drawer .sku-row {
      margin-bottom: 18px;
    }
    .sku-drawer .sku-row__label {
      font-size: 13px; color: var(--text-tertiary); margin-bottom: 10px;
    }
    .sku-options {
      display: flex; flex-wrap: wrap; gap: 8px;
    }
    .sku-option {
      padding: 6px 14px;
      border-radius: 16px;
      background: var(--bg-muted);
      color: var(--text-primary);
      font-size: 13px;
      cursor: pointer;
      border: 1px solid transparent;
      transition: all .2s;
    }
    .sku-option.active {
      background: var(--primary-light);
      color: var(--primary);
      border-color: var(--primary);
      font-weight: 600;
    }
    .sku-row__qty {
      display: flex; align-items: center; justify-content: space-between;
    }
    .sku-row__qty .num-stepper {
      display: flex; align-items: center; gap: 0;
    }
    .sku-row__qty .qty-btn {
      width: 28px; height: 28px;
      border: 1px solid var(--border-color);
      background: #fafafa;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
      color: var(--text-secondary);
      transition: all .15s;
      cursor: pointer;
    }
    .sku-row__qty .qty-btn:first-child { border-radius: 14px 0 0 14px; }
    .sku-row__qty .qty-btn:last-child  { border-radius: 0 14px 14px 0; }
    .sku-row__qty .qty-btn:active { background: #eee; }
    .sku-row__qty .qty-num {
      width: 50px; height: 28px;
      border-top: 1px solid var(--border-color);
      border-bottom: 1px solid var(--border-color);
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; font-weight: 500;
    }

    /* 全屏图片预览 */
    .img-preview {
      position: fixed; inset: 0;
      background: #000;
      z-index: 9999;
      display: none;
      touch-action: pan-y;
    }
    .img-preview.show { display: flex; align-items: center; }
    .img-preview__close {
      position: absolute; top: 16px; left: 16px;
      color: #fff; font-size: 22px;
      z-index: 2; background: none; border: none;
      width: 36px; height: 36px;
      display: flex; align-items: center; justify-content: center;
    }
    .img-preview__counter {
      position: absolute; top: 18px; left: 50%;
      transform: translateX(-50%);
      color: #fff; font-size: 14px;
      background: rgba(0,0,0,.3);
      padding: 4px 12px;
      border-radius: 14px;
      z-index: 2;
    }
    .img-preview__track {
      display: flex;
      width: 100%; height: 100%;
      transition: transform .3s ease;
    }
    .img-preview__slide {
      min-width: 100%;
      display: flex; align-items: center; justify-content: center;
    }
    .img-preview__slide img {
      max-width: 100%; max-height: 100%;
      object-fit: contain;
    }

    /* loading 占位 */
    .skeleton-line {
      height: 14px;
      background: linear-gradient(90deg, #f0f0f0 25%, #e8e8e8 50%, #f0f0f0 75%);
      background-size: 200% 100%;
      animation: skel 1.4s infinite;
      border-radius: 4px;
      margin: 8px 0;
    }
    @keyframes skel { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
  </style>
</head>
<body>
  <div class="page-container detail-page" id="detailPage">

    <!-- ① 顶部导航 -->
    <header class="detail-nav detail-nav--top" id="detailNav">
      <div class="detail-nav__placeholder"></div>
      <div class="detail-nav__bar">
        <button class="detail-nav__icon" id="navBack" aria-label="返回">
          <i class="fa fa-chevron-left"></i>
        </button>
        <div class="detail-nav__search" id="navSearch" onclick="goToSearchPage()">
          <i class="fa fa-search"></i>
          <span>搜索商品</span>
        </div>
        <button class="detail-nav__icon" id="navShare" aria-label="分享" onclick="openShareDrawer()">
          <i class="fa fa-share-alt"></i>
        </button>
      </div>
      <nav class="detail-tabs" id="detailTabs">
        <a class="detail-tab active" data-tab="info">商品</a>
        <a class="detail-tab" data-tab="review">评价</a>
        <a class="detail-tab" data-tab="desc">详情</a>
        <a class="detail-tab" data-tab="recommend">推荐</a>
      </nav>
    </header>

    <!-- ② 主体 -->
    <main class="detail-body" id="detailBody">

      <!-- 商品信息 section -->
      <section data-anchor="info" class="detail-section" id="infoSection">
        <!-- 轮播 Banner -->
        <div class="detail-banner banner-carousel" id="detailBanner">
          <div class="slides" id="bannerSlides"></div>
          <div class="dots" id="bannerDots"></div>
        </div>

        <!-- 价格 / 名称 / 销量 -->
        <div class="detail-info-card">
          <div class="detail-price-row">
            <span class="product-price">¥<big id="priceMain">0.0</big></span>
            <span class="product-original-price" id="marketPrice"></span>
            <span class="detail-sales" id="salesText">已售 0</span>
          </div>
          <h1 class="detail-name" id="nameText">加载中…</h1>

          <!-- 供应商 -->
          <div class="detail-supplier" id="supplierBox" onclick="goToHomeWithSupplier(currentDetailProduct().brand)">
            <div class="detail-supplier__icon"><i class="fa fa-store"></i></div>
            <div class="detail-supplier__info">
              <div class="detail-supplier__name" id="supplierName">湖东食堂</div>
              <div class="detail-supplier__meta">福建省永辉超市有限公司</div>
            </div>
            <i class="fa fa-chevron-right detail-supplier__arrow"></i>
          </div>

          <!-- 加购选择入口 -->
          <div class="detail-sku-row" onclick="openSkuPicker()">
            <span class="detail-sku-row__label">已选</span>
            <span class="detail-sku-row__value" id="selectedSpecText">默认规格 1 份</span>
            <i class="fa fa-chevron-right detail-sku-row__arrow"></i>
          </div>

          <!-- 商品参数 -->
          <div class="detail-params" id="paramsBox"></div>
        </div>
      </section>

      <!-- 用户评价 section -->
      <section data-anchor="review" class="detail-section" id="reviewSection">
        <div class="section-title">
          <h3 id="reviewTitle">用户评价</h3>
          <a class="more" href="javascript:;" onclick="goToReviewAll()">
            查看全部 <i class="fa fa-chevron-right"></i>
          </a>
        </div>
        <div class="detail-review-list" id="reviewList"></div>
        <a class="detail-review-all" id="reviewAll" href="javascript:;" onclick="goToReviewAll()">
          查看全部评价 <i class="fa fa-chevron-right"></i>
        </a>
      </section>

      <!-- 相似推荐 section -->
      <section data-anchor="recommend" class="detail-section" id="recommendSection">
        <div class="section-title">
          <h3>相似推荐</h3>
          <div class="detail-rec-tabs">
            <a class="rec-tab active" data-sort="price">低价推荐</a>
            <a class="rec-tab" data-sort="rate">好评推荐</a>
          </div>
        </div>
        <div class="rv-swipe-wrapper" id="recommendGrid"></div>
      </section>

      <!-- 商品详情 section -->
      <section data-anchor="desc" class="detail-section" id="descSection">
        <div class="section-title"><h3>商品详情</h3></div>
        <div class="detail-intro" id="detailIntro"></div>
        <div class="detail-pics" id="detailPics"></div>
      </section>

      <div style="height:80px;"></div>
    </main>

    <!-- ③ 底部操作栏 -->
    <footer class="detail-actionbar" id="detailActionBar">
      <button class="detail-actionbar__icon" id="favBtn" onclick="toggleFavorite()">
        <i class="fa fa-star"></i><span>收藏</span>
      </button>
      <button class="detail-actionbar__icon" onclick="goToCartPage()">
        <i class="fa fa-shopping-cart"></i><span>购物车</span>
        <span class="badge cart-badge" id="cartBadge">0</span>
      </button>
      <button class="detail-actionbar__btn detail-actionbar__btn--cart" onclick="openSkuPicker()">加入购物车</button>
      <button class="detail-actionbar__btn detail-actionbar__btn--buy" onclick="openSkuPicker(true, true)">立即购买</button>
    </footer>

    <!-- ④ 分享抽屉 -->
    <div class="overlay" id="shareOverlay" onclick="closeShareDrawer()"></div>
    <aside class="drawer share-drawer" id="shareDrawer">
      <div class="drawer__head">
        <span>分享商品</span>
        <i class="fa fa-times" onclick="closeShareDrawer()"></i>
      </div>
      <div class="drawer__body">
        <div class="share-drawer__list" id="shareChannelList">
          <a class="share-item" onclick="doShare('wechat')"><i class="fab fa-weixin"></i><span>微信好友</span></a>
          <a class="share-item" onclick="doShare('moments')"><i class="fab fa-weixin"></i><span>朋友圈</span></a>
          <a class="share-item" onclick="doShare('qq')"><i class="fab fa-qq"></i><span>QQ</span></a>
          <a class="share-item" onclick="doShare('link')"><i class="fa fa-link"></i><span>复制链接</span></a>
        </div>
        <div class="share-drawer__url" id="shareUrlBox">
          <span id="shareUrlText"></span>
          <button onclick="copyShareUrl()">复制</button>
        </div>
      </div>
    </aside>

    <!-- ⑤ SKU 抽屉 -->
    <div class="overlay" id="skuOverlay" onclick="closeSkuPicker()"></div>
    <div class="drawer sku-drawer" id="skuDrawer">
      <div class="drawer__body" id="skuBody"></div>
      <div class="drawer__foot">
        <button class="btn-primary" id="skuConfirm" onclick="confirmSku()" style="width:100%;height:44px;">确定</button>
      </div>
    </aside>

    <!-- ⑥ 全屏图片预览 -->
    <div class="img-preview" id="imgPreview">
      <button class="img-preview__close" onclick="closeImgPreview()" aria-label="关闭">
        <i class="fa fa-chevron-left"></i>
      </button>
      <div class="img-preview__counter" id="imgPreviewCounter">1/1</div>
      <div class="img-preview__track" id="imgPreviewTrack"></div>
    </div>
  </div>

  <script src="app.js"></script>
  <script>
    /* ============================================================
       商品详情页 - 业务逻辑
       ============================================================ */
    (function() {
      'use strict';

      // ---------- 当前商品 ----------
      function getProductIdFromUrl() {
        const params = new URLSearchParams(location.search);
        const id = parseInt(params.get('id') || params.get('productId') || '1');
        return isNaN(id) ? 1 : id;
      }
      const CURRENT_ID = getProductIdFromUrl();
      window.currentDetailProduct = function() {
        return PRODUCTS.find(p => p.id === CURRENT_ID) || PRODUCTS[0];
      };

      let bannerApi = null;
      let currentReviews = [];
      let skuSelected = { spec: '', qty: 1 };
      let buyNow = false;
      let previewImages = [];
      let previewIndex = 0;
      let previewTouch = { startX: 0, moved: false, deltaX: 0 };

      // ---------- 初始化 ----------
      function init() {
        const p = currentDetailProduct();
        renderBanner(p);
        renderInfo(p);
        renderParams(p);
        renderReviews(p);
        renderIntroAndPics(p);
        renderRecommend(p);
        initFavState(p);
        initNavState();
        initTabs();
        initSkuDefaults(p);
        // 接受父页 postMessage 修改 id（iframe 模式）
        window.addEventListener('message', function(e) {
          if (e.data && e.data.type === 'setProduct' && e.data.id) {
            const newId = parseInt(e.data.id);
            if (!isNaN(newId) && newId !== CURRENT_ID) {
              const url = new URL(location.href);
              url.searchParams.set('id', newId);
              location.href = url.toString();
            }
          }
        });
      }

      // ---------- 顶部导航双态 ----------
      function initNavState() {
        const nav = document.getElementById('detailNav');
        const tabs = document.getElementById('detailTabs');
        const search = document.getElementById('navSearch');
        const banner = document.getElementById('detailBanner');

        function update() {
          const passed = banner.getBoundingClientRect().bottom <= 60;
          nav.classList.toggle('detail-nav--top', !passed);
          nav.classList.toggle('detail-nav--solid', passed);
          tabs.classList.toggle('show', passed);
          search.classList.toggle('show', passed);
        }
        window.addEventListener('scroll', update, { passive: true });
        window.addEventListener('resize', update);
        update();
      }

      // ---------- 返回 ----------
      document.getElementById('navBack').addEventListener('click', function() {
        if (window.history.length > 1) {
          history.back();
        } else {
          if (window.parent !== window) {
            window.parent.postMessage({ type: 'switchPage', page: 'search' }, '*');
          } else {
            location.href = '搜索页.html';
          }
        }
      });

      // ---------- Tab 切换 ----------
      function initTabs() {
        const tabs = document.querySelectorAll('.detail-tab');
        tabs.forEach(t => {
          t.addEventListener('click', function() {
            const tab = this.dataset.tab;
            const target = document.querySelector('[data-anchor="' + tab + '"]');
            if (target) {
              const navH = document.getElementById('detailNav').offsetHeight || 90;
              const top = target.getBoundingClientRect().top + window.scrollY - navH;
              window.scrollTo({ top: top, behavior: 'smooth' });
            }
          });
        });

        // 滚动反向高亮
        const sections = document.querySelectorAll('.detail-section');
        const io = new IntersectionObserver(entries => {
          entries.forEach(e => {
            if (e.isIntersecting) {
              const id = e.target.dataset.anchor;
              tabs.forEach(t => t.classList.toggle('active', t.dataset.tab === id));
            }
          });
        }, { rootMargin: '-30% 0px -60% 0px', threshold: 0 });
        sections.forEach(s => io.observe(s));

        // 推荐标签切换
        document.querySelectorAll('.rec-tab').forEach(t => {
          t.addEventListener('click', function() {
            document.querySelectorAll('.rec-tab').forEach(x => x.classList.remove('active'));
            this.classList.add('active');
            renderRecommend(currentDetailProduct(), this.dataset.sort);
          });
        });
      }

      // ---------- Banner 轮播 ----------
      function renderBanner(p) {
        const slides = document.getElementById('bannerSlides');
        const dots = document.getElementById('bannerDots');
        const imgs = p.banners && p.banners.length ? p.banners : [p.img, p.img, p.img];
        slides.innerHTML = imgs.map((src, i) => {
          return '<div class="slide" data-i="' + i + '"><img src="' + src + '" alt="banner" onerror="this.src=\'https://via.placeholder.com/600?text=' + encodeURIComponent(p.name) + '\'"></div>';
        }).join('');
        dots.innerHTML = imgs.map((_, i) => '<button class="dot' + (i === 0 ? ' active' : '') + '" data-i="' + i + '"></button>').join('');

        // 点击单图进入全屏
        slides.querySelectorAll('.slide').forEach(s => {
          s.addEventListener('click', function() {
            openImgPreview(imgs, parseInt(this.dataset.i || '0'));
          });
        });

        bannerApi = initBannerCarousel('#detailBanner', true, 3500);
      }

      // ---------- 商品基础信息 ----------
      function renderInfo(p) {
        document.getElementById('priceMain').textContent = p.price.toFixed(1);
        document.getElementById('marketPrice').textContent = p.marketPrice ? '市场价 ¥' + p.marketPrice.toFixed(1) : '';
        document.getElementById('salesText').textContent = '已售 ' + formatNum(p.sales);

        const tags = [];
        if (p.dailyLimit) tags.push('<span class="tag tag-warning">每日限量 ' + p.dailyLimit + ' 份</span>');
        tags.push('<span class="tag tag-success">支持7天无理由退货</span>');
        document.getElementById('nameText').innerHTML =
          escapeHtml(p.name) + tags.join('');

        document.getElementById('supplierName').textContent = p.brand || '食堂自制';
        document.title = p.name + ' - 马尾食堂';
      }

      // ---------- 商品参数 ----------
      function renderParams(p) {
        const catL1 = p.category || '其他';
        const catL2 = p.subCategory || p.spec || '常规';
        const rows = [
          ['类别', catL1 + ' / ' + catL2],
          ['规格', (p.spec || '1') + ' 份'],
          ['配送方式', '自取 · 包邮'],
          ['销售周期', '周一至周五'],
          ['销售时间', '08:30:00 - 18:00:00'],
          ['领取时间', '次日 08:30:00 - 18:00:00'],
          ['保留时间', '1天']
        ];
        document.getElementById('paramsBox').innerHTML = rows.map(r =>
          '<div class="detail-params__row"><label>' + r[0] + '</label><span>' + r[1] + '</span></div>'
        ).join('');
      }

      // ---------- 评价 ----------
      function renderReviews(p) {
        const total = 28 + Math.floor(Math.random() * 20) + (p.id % 7);
        currentReviews = generateReviews(p.id, total);
        const avg = (currentReviews.reduce((s, r) => s + r.stars, 0) / currentReviews.length).toFixed(1);

        const goodCount = currentReviews.filter(r => r.stars >= 4).length;
        const goodRate = ((goodCount / total) * 100).toFixed(2);
        const countLabel = total >= 1000 ? Math.floor(total / 1000) + '000+' : total;
        document.getElementById('reviewTitle').innerHTML = '用户评价 <span class="review-count">(' + countLabel + ')</span> <span class="review-good-rate">近3个月好评率 ' + goodRate + '%</span>';

        // 默认展示最新 3 条
        const latest = currentReviews.slice().sort((a, b) => b.time.localeCompare(a.time)).slice(0, 3);
        document.getElementById('reviewList').innerHTML = latest.map(r => {
          const imgsHtml = r.imgs && r.imgs.length ? r.imgs.map((src, i) => {
            return '<img src="' + src + '" alt="" onclick="event.stopPropagation();openImgPreview(' + JSON.stringify(r.imgs).replace(/"/g, '&quot;') + ',' + i + ')" onerror="this.style.display=\'none\'">';
          }).join('') : '';
          return '' +
            '<div class="detail-review-item">' +
              '<div class="detail-review-item__head">' +
                '<span class="detail-review-item__name">' + escapeHtml(r.name) + '</span>' +
                '<span class="detail-review-item__stars">' + (function() {
            var label = r.stars >= 4 ? '好评' : (r.stars >= 3 ? '一般' : '差评');
            var color = r.stars >= 4 ? '#52c41a' : (r.stars >= 3 ? '#faad14' : '#f5222d');
            var cls = r.stars >= 4 ? 'star-label--good' : (r.stars >= 3 ? 'star-label--ok' : 'star-label--bad');
            return '<i class="fa fa-star" style="color:' + color + ';"></i><span class="star-label ' + cls + '">' + label + '</span>';
          }()) + '</span>' +
              '</div>' +
              '<div class="detail-review-item__text">' + escapeHtml(r.text) + '</div>' +
              (imgsHtml ? '<div class="detail-review-item__imgs">' + imgsHtml + '</div>' : '') +
              '<div class="detail-review-item__meta">' +
                (r.spec ? '<span>' + escapeHtml(r.spec) + '</span>' : '') +
                '<span>' + r.time + '</span>' +
              '</div>' +
            '</div>';
        }).join('');
      }

      function goToReviewAll() {
        if (window.parent !== window) {
          window.parent.postMessage({ type: 'switchPage', page: 'reviewView', id: CURRENT_ID }, '*');
          return;
        }
        location.href = '评价查看页.html?id=' + CURRENT_ID;
      }

      // ---------- 商品详情 ----------
      function renderIntroAndPics(p) {
        document.getElementById('detailIntro').textContent = p.desc || '';
        const imgs = p.detailImgs && p.detailImgs.length ? p.detailImgs : [p.img];
        document.getElementById('detailPics').innerHTML = imgs.map((src, i) => {
          return '<img src="' + src + '" alt="" onclick="openImgPreview(' + JSON.stringify(imgs).replace(/"/g, '&quot;') + ',' + i + ')" onerror="this.style.display=\'none\'">';
        }).join('');
      }

      // ---------- 相似推荐 ----------
      function renderRecommend(p, sort) {
        sort = sort || 'price';
        const sameCat = PRODUCTS.filter(x => x.category === p.category && x.id !== p.id);
        let list = sameCat.length >= 3 ? sameCat.slice() : PRODUCTS.filter(x => x.id !== p.id).slice(0, 6);
        if (sort === 'price') {
          list.sort((a, b) => a.price - b.price);
        } else {
          list.sort((a, b) => (b.rate || 4.5) - (a.rate || 4.5));
        }
        const finalList = list.slice(0, 9);
        if (!finalList.length) {
          document.getElementById('recommendGrid').innerHTML = '<div style="text-align:center;color:#999;font-size:13px;padding:20px 0;">暂无相似推荐</div>';
          return;
        }
        const cardCount = finalList.length;
        const cardsHtml = finalList.map(x =>
          '<div class="rv-card" onclick="goToProductDetail(' + x.id + ')">' +
            '<img class="rv-card-img" src="' + x.img + '" alt="" onerror="this.src=\'https://via.placeholder.com/200?text=\'">' +
            '<div class="rv-card-body">' +
              '<div class="rv-card-title">' + x.name + '</div>' +
              '<div class="rv-card-bottom">' +
                '<span class="rv-card-price">¥' + x.price.toFixed(1) + '</span>' +
                '<span class="rv-card-rating"><i class="fa fa-star"></i>' + (x.rate || '4.5') + '</span>' +
              '</div>' +
            '</div>' +
          '</div>'
        ).join('');

        const pageCount = Math.ceil(cardCount / 3);
        const dotsHtml = Array.from({length: pageCount}, (_, i) =>
          '<span class="rv-dot' + (i === 0 ? ' active' : '') + '" data-page="' + i + '"></span>'
        ).join('');

        document.getElementById('recommendGrid').innerHTML =
          '<div class="rv-swipe-track" id="rvSwipeTrack">' + cardsHtml + '</div>' +
          '<div class="rv-pagination" id="rvPagination">' + dotsHtml + '</div>';

        var track = document.getElementById('rvSwipeTrack');
        track.addEventListener('scroll', function() {
          var pageW = track.clientWidth;
          var idx = Math.round(track.scrollLeft / pageW);
          document.querySelectorAll('.rv-dot').forEach(function(d, i) {
            d.classList.toggle('active', i === idx);
          });
        });
      }

      // ---------- 收藏 ----------
      function initFavState(p) {
        const isFav = Favorites.has(p.id) || true;
        const btn = document.getElementById('favBtn');
        btn.querySelector('i').className = isFav ? 'fa fa-star' : 'fa fa-star-o';
        btn.style.color = isFav ? '#FFB94E' : '';
      }
      window.toggleFavorite = function() {
        const p = currentDetailProduct();
        const added = Favorites.toggle(p);
        const btn = document.getElementById('favBtn');
        btn.querySelector('i').className = added ? 'fa fa-star' : 'fa fa-star-o';
        btn.style.color = added ? '#FFB94E' : '';
        showToast(added ? '已加入收藏' : '已取消收藏', 'success');
      };

      // ---------- 客服 ----------
      window.openCustomerService = function() {
        showToast('正在为您接入客服...', 'default');
        setTimeout(() => showToast('客服暂未在线', 'warning'), 1200);
      };

      // ---------- SKU 抽屉 ----------
      function initSkuDefaults(p) {
        skuSelected.spec = (p.specs && p.specs[0]) || (p.spec || '默认规格');
        skuSelected.qty = 1;
        document.getElementById('selectedSpecText').textContent = skuSelected.spec + ' 1 份';
      }

      window.openSkuPicker = function(addOnly, isBuyNow) {
        buyNow = !!isBuyNow;
        const p = currentDetailProduct();
        const body = document.getElementById('skuBody');
        const specOpts = p.specs || [p.spec || '默认规格'];
        body.innerHTML = '' +
          '<div class="sku-head">' +
            '<img src="' + p.img + '" alt="" onerror="this.src=\'https://via.placeholder.com/120?text=' + encodeURIComponent(p.name) + '\'">' +
            '<div>' +
              '<div class="sku-price">¥' + p.price.toFixed(1) + '</div>' +
              '<div class="sku-stock">库存 ' + p.stock + ' · 已选 ' + escapeHtml(skuSelected.spec) + ' ' + skuSelected.qty + ' 份</div>' +
            '</div>' +
          '</div>' +
          '<div class="sku-row">' +
            '<div class="sku-row__label">规格</div>' +
            '<div class="sku-options">' +
              specOpts.map(s => '<a class="sku-option' + (s === skuSelected.spec ? ' active' : '') + '" data-spec="' + escapeHtml(s) + '">' + escapeHtml(s) + '</a>').join('') +
            '</div>' +
          '</div>' +
          '<div class="sku-row">' +
            '<div class="sku-row__qty">' +
              '<span class="sku-row__label">数量</span>' +
              '<div class="num-stepper">' +
                '<button class="qty-btn" id="skuMinus">-</button>' +
                '<span class="qty-num" id="skuNum">' + skuSelected.qty + '</span>' +
                '<button class="qty-btn" id="skuPlus">+</button>' +
              '</div>' +
            '</div>' +
          '</div>';

        // 规格选择
        body.querySelectorAll('.sku-option').forEach(o => {
          o.addEventListener('click', function() {
            body.querySelectorAll('.sku-option').forEach(x => x.classList.remove('active'));
            this.classList.add('active');
            skuSelected.spec = this.dataset.spec;
          });
        });
        // 数量
        document.getElementById('skuMinus').addEventListener('click', function() {
          if (skuSelected.qty > 1) {
            skuSelected.qty--;
            document.getElementById('skuNum').textContent = skuSelected.qty;
          }
        });
        document.getElementById('skuPlus').addEventListener('click', function() {
          if (skuSelected.qty < (p.stock || 99)) {
            skuSelected.qty++;
            document.getElementById('skuNum').textContent = skuSelected.qty;
          }
        });

        showModal('#skuOverlay');
        document.getElementById('skuDrawer').classList.add('show');
        document.getElementById('skuConfirm').textContent = buyNow ? '立即购买' : '加入购物车';
      };

      window.closeSkuPicker = function() {
        hideModal('#skuOverlay');
        document.getElementById('skuDrawer').classList.remove('show');
      };

      window.confirmSku = function() {
        const p = currentDetailProduct();
        document.getElementById('selectedSpecText').textContent = skuSelected.spec + ' ' + skuSelected.qty + ' 份';
        if (buyNow) {
          closeSkuPicker();
          goToOrderConfirm(p.id, skuSelected.qty);
        } else {
          Cart.add({
            id: p.id,
            name: p.name,
            price: p.price,
            img: p.img,
            tag: p.tag,
            spec: skuSelected.spec,
            stock: p.stock,
            unavailable: p.unavailable
          });
          closeSkuPicker();
          showToast('已加入购物车', 'success');
        }
      };

      // ---------- 分享抽屉 ----------
      window.openShareDrawer = function() {
        const p = currentDetailProduct();
        const url = buildShareUrl(p.id);
        document.getElementById('shareUrlText').textContent = url;
        showModal('#shareOverlay');
        document.getElementById('shareDrawer').classList.add('show');
      };
      window.closeShareDrawer = function() {
        hideModal('#shareOverlay');
        document.getElementById('shareDrawer').classList.remove('show');
      };
      function buildShareUrl(id) {
        const base = location.origin + location.pathname;
        return base + '?id=' + id + '&shareUid=' + getShareUid();
      }
      window.doShare = function(channel) {
        const url = buildShareUrl(CURRENT_ID);
        if (channel === 'wechat' || channel === 'moments' || channel === 'qq') {
          showToast('已唤起' + (channel === 'wechat' ? '微信' : channel === 'moments' ? '朋友圈' : 'QQ') + '分享', 'success');
          closeShareDrawer();
        } else if (channel === 'link') {
          copyToClipboard(url);
        }
      };
      window.copyShareUrl = function() {
        copyToClipboard(document.getElementById('shareUrlText').textContent);
      };
      function copyToClipboard(text) {
        if (navigator.clipboard && navigator.clipboard.writeText) {
          navigator.clipboard.writeText(text).then(
            () => showToast('链接已复制', 'success'),
            () => fallbackCopy(text)
          );
        } else {
          fallbackCopy(text);
        }
        closeShareDrawer();
      }
      function fallbackCopy(text) {
        const ta = document.createElement('textarea');
        ta.value = text;
        ta.style.cssText = 'position:fixed;top:-1000px;';
        document.body.appendChild(ta);
        ta.select();
        try { document.execCommand('copy'); showToast('链接已复制', 'success'); }
        catch (e) { showToast('复制失败，请手动复制', 'error'); }
        document.body.removeChild(ta);
      }

      // ---------- 全屏图片预览 ----------
      window.openImgPreview = function(images, startIndex) {
        previewImages = images || [];
        previewIndex = startIndex || 0;
        if (!previewImages.length) return;
        const track = document.getElementById('imgPreviewTrack');
        track.innerHTML = previewImages.map(src => '<div class="img-preview__slide"><img src="' + src + '" alt="" onerror="this.src=\'https://via.placeholder.com/600?text=图片\'"></div>').join('');
        setPreviewIndex(previewIndex);
        document.getElementById('imgPreview').classList.add('show');
        bindPreviewTouch();
      };
      window.closeImgPreview = function() {
        document.getElementById('imgPreview').classList.remove('show');
        previewImages = [];
      };
      function setPreviewIndex(i) {
        previewIndex = (i + previewImages.length) % previewImages.length;
        const track = document.getElementById('imgPreviewTrack');
        track.style.transform = 'translateX(-' + previewIndex * 100 + '%)';
        document.getElementById('imgPreviewCounter').textContent = (previewIndex + 1) + '/' + previewImages.length;
      }
      function bindPreviewTouch() {
        const box = document.getElementById('imgPreview');
        box.ontouchstart = function(e) {
          previewTouch.startX = e.touches[0].clientX;
          previewTouch.moved = false;
          previewTouch.deltaX = 0;
        };
        box.ontouchmove = function(e) {
          const diff = e.touches[0].clientX - previewTouch.startX;
          if (Math.abs(diff) > 4) previewTouch.moved = true;
          previewTouch.deltaX = diff;
        };
        box.ontouchend = function(e) {
          if (!previewTouch.moved) return;
          const diff = previewTouch.deltaX;
          if (diff < -40) setPreviewIndex(previewIndex + 1);
          else if (diff > 40) setPreviewIndex(previewIndex - 1);
        };
      }

      // ---------- 工具 ----------
      function escapeHtml(s) {
        return String(s == null ? '' : s)
          .replace(/&/g, '&amp;').replace(/</g, '&lt;')
          .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
      }

      // 防止商品卡在详情页内再次打开详情（点击穿透）
      document.getElementById('detailBody').addEventListener('click', function(e) {
        const card = e.target.closest('.product-card');
        if (card) {
          e.stopPropagation();
          // 让 app.js 的 goToProductDetail 自然执行（点击事件已绑定）
        }
      });

      // 启动
      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', init);
      } else {
        init();
      }
    })();
  </script>
</body>
</html>
