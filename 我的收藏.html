<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>我的收藏 - 马尾食堂</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    :root {
      --primary: #1890FF;
      --primary-light: #e6f4ff;
      --success: #52c41a;
      --warning: #faad14;
      --error: #f5222d;
      --text-primary: #1a1a1a;
      --text-secondary: #666666;
      --text-tertiary: #999999;
      --border-color: #f0f0f0;
      --bg-color: #f5f5f5;
    }

    body { margin: 0; background: var(--bg-color); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }

    /* ===== 顶部导航 ===== */
    .fav-header {
      background: #fff;
      padding: 14px 16px;
      padding-top: max(14px, env(safe-area-inset-top));
      display: flex;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 100;
      border-bottom: 1px solid var(--border-color);
    }
    .fav-back {
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-primary);
      font-size: 16px;
      cursor: pointer;
      flex-shrink: 0;
    }
    .fav-back:active { opacity: 0.6; }
    .fav-title {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      font-size: 17px;
      font-weight: 600;
      color: var(--text-primary);
      pointer-events: none;
    }

    /* ===== 收藏列表 ===== */
    .fav-content {
      padding: 12px;
    }
    .fav-list {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
    }

    /* ===== 商品卡片 ===== */
    .fav-card {
      background: #fff;
      border-radius: 10px;
      overflow: hidden;
      position: relative;
    }
    .fav-card.unavailable {
      opacity: 0.7;
    }
    .fav-card-img-wrap {
      position: relative;
      width: 100%;
      aspect-ratio: 1;
      background: #f9f9f9;
    }
    .fav-card-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .fav-close-btn {
      position: absolute;
      top: 6px;
      right: 6px;
      width: 22px;
      height: 22px;
      background: rgba(0,0,0,0.4);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 10px;
      cursor: pointer;
      z-index: 10;
    }
    .fav-close-btn:active {
      background: rgba(0,0,0,0.6);
    }
    .fav-tag {
      position: absolute;
      top: 6px;
      left: 6px;
      padding: 2px 6px;
      background: linear-gradient(135deg, #ff6b6b, #ff8e53);
      color: #fff;
      font-size: 10px;
      border-radius: 4px;
    }
    .fav-unavailable-tag {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      padding: 4px 12px;
      background: rgba(0,0,0,0.6);
      color: #fff;
      font-size: 12px;
      border-radius: 4px;
    }
    .fav-card-info {
      padding: 8px 10px;
    }
    .fav-card-name {
      font-size: 13px;
      color: var(--text-primary);
      margin-bottom: 4px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      line-height: 1.4;
      height: 36px;
    }
    .fav-card-spec {
      font-size: 11px;
      color: var(--text-tertiary);
      margin-bottom: 6px;
    }
    .fav-card-bottom {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .fav-card-price {
      font-size: 15px;
      color: var(--error);
      font-weight: 700;
    }
    .fav-add-btn {
      width: 26px;
      height: 26px;
      background: var(--primary);
      color: #fff;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .fav-add-btn:active {
      transform: scale(0.9);
    }
    .fav-add-btn.disabled {
      background: #ccc;
      cursor: not-allowed;
    }

    /* ===== 空状态 ===== */
    .fav-empty {
      text-align: center;
      padding: 80px 20px;
      color: var(--text-tertiary);
    }
    .fav-empty i {
      font-size: 60px;
      color: #d9d9d9;
      margin-bottom: 16px;
      display: block;
    }
    .fav-empty p {
      font-size: 14px;
      margin: 0;
    }

    /* ===== 底部操作栏 ===== */
    .fav-footer {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: #fff;
      padding: 10px 16px calc(10px + env(safe-area-inset-bottom, 0px));
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-top: 1px solid var(--border-color);
      z-index: 100;
    }
    .fav-footer-info {
      display: flex;
      flex-direction: column;
    }
    .fav-footer-selected {
      font-size: 13px;
      color: var(--text-secondary);
    }
    .fav-footer-price {
      font-size: 16px;
      color: var(--error);
      font-weight: 700;
    }
    .fav-footer-btn {
      padding: 10px 24px;
      background: linear-gradient(135deg, #1890FF, #40a9ff);
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      border-radius: 20px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .fav-footer-btn:active {
      transform: scale(0.95);
      opacity: 0.9;
    }
    .fav-bottom-fill {
      height: 70px;
    }

    /* ===== Toast ===== */
    .fav-toast {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0,0,0,0.72);
      color: #fff;
      font-size: 13px;
      padding: 10px 22px;
      border-radius: 22px;
      z-index: 700;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div class="fav-page">
    <!-- 顶部导航 -->
    <div class="fav-header">
      <div class="fav-back" onclick="goBack()">
        <i class="fa fa-chevron-left"></i>
      </div>
      <div class="fav-title">我的收藏</div>
    </div>

    <!-- 收藏列表 -->
    <div class="fav-content" id="favContent"></div>

    <!-- 空状态 -->
    <div class="fav-empty" id="favEmpty" style="display:none;">
      <i class="fa fa-heart"></i>
      <p>没有相关商品~</p>
    </div>

    <!-- 底部操作栏 -->
    <div class="fav-footer" id="favFooter">
      <div class="fav-footer-info">
        <span class="fav-footer-selected">已选 (<span id="favCount">0</span>)</span>
        <span class="fav-footer-price">¥<span id="favTotalPrice">0</span></span>
      </div>
      <div class="fav-footer-btn" onclick="goToCart()">去购物车</div>
    </div>

    <div class="fav-bottom-fill"></div>
  </div>

  <script src="app.js"></script>
  <script>
    /* ===== 我的收藏 ===== */

    let favorites = [];
    let cartItems = []; // 从收藏加入购物车的商品

    // 模拟收藏数据
    const mockFavorites = [
      {
        id: 101,
        name: '红烧狮子头套餐',
        spec: '大份',
        price: 28.8,
        tag: '爆款',
        img: 'https://images.unsplash.com/photo-1544025162-d76694265947?w=300&h=300&fit=crop',
        unavailable: false
      },
      {
        id: 102,
        name: '香菇鸡肉盖饭',
        spec: '微辣',
        price: 18.0,
        tag: '新品',
        img: 'https://images.unsplash.com/photo-1569718212165-3a8278d5f624?w=300&h=300&fit=crop',
        unavailable: false
      },
      {
        id: 103,
        name: '酸菜鱼套餐',
        spec: '中辣',
        price: 32.0,
        tag: '',
        img: 'https://images.unsplash.com/photo-1587131782738-de30ea91a542?w=300&h=300&fit=crop',
        unavailable: false
      },
      {
        id: 104,
        name: '宫保鸡丁盖饭',
        spec: '标准',
        price: 20.0,
        tag: '热销',
        img: 'https://images.unsplash.com/photo-1484723091739-30a097e8f929?w=300&h=300&fit=crop',
        unavailable: false
      },
      {
        id: 105,
        name: '已下架商品',
        spec: '标准',
        price: 15.0,
        tag: '',
        img: 'https://images.unsplash.com/photo-1544025162-d76694265947?w=300&h=300&fit=crop',
        unavailable: true
      },
      {
        id: 106,
        name: '卤牛肉拼盘',
        spec: '中份',
        price: 38.0,
        tag: '爆款',
        img: 'https://images.unsplash.com/photo-1547592180-85f173990554?w=300&h=300&fit=crop',
        unavailable: false
      }
    ];

    // ---------- 初始化 ----------
    function init() {
      favorites = [...mockFavorites];
      renderFavorites();
      updateFooter();
    }

    // ---------- 渲染收藏列表 ----------
    function renderFavorites() {
      const container = document.getElementById('favContent');
      const emptyEl = document.getElementById('favEmpty');
      const footerEl = document.getElementById('favFooter');

      if (favorites.length === 0) {
        container.innerHTML = '';
        emptyEl.style.display = 'block';
        footerEl.style.display = 'none';
        return;
      }

      emptyEl.style.display = 'none';
      footerEl.style.display = 'flex';

      container.innerHTML = `
        <div class="fav-list">
          ${favorites.map(item => `
            <div class="fav-card ${item.unavailable ? 'unavailable' : ''}" id="favCard_${item.id}">
              <div class="fav-card-img-wrap">
                <img class="fav-card-img" src="${item.img}" alt="${item.name}" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect fill=%22%23f0f0f0%22 width=%22100%22 height=%22100%22/><text x=%2250%22 y=%2255%22 text-anchor=%22middle%22 fill=%22%23999%22 font-size=%2212%22>图片</text></svg>'">
                ${item.tag ? `<span class="fav-tag">${item.tag}</span>` : ''}
                ${item.unavailable ? `<span class="fav-unavailable-tag">已下架</span>` : ''}
                <div class="fav-close-btn" onclick="removeFavorite(${item.id})">
                  <i class="fa fa-times"></i>
                </div>
              </div>
              <div class="fav-card-info">
                <div class="fav-card-name">${item.name}</div>
                <div class="fav-card-spec">${item.spec}</div>
                <div class="fav-card-bottom">
                  <span class="fav-card-price">¥${item.price.toFixed(1)}</span>
                  <div class="fav-add-btn ${item.unavailable ? 'disabled' : ''}" onclick="${item.unavailable ? '' : `addToCart(${item.id})`}">
                    <i class="fa fa-plus"></i>
                  </div>
                </div>
              </div>
            </div>
          `).join('')}
        </div>
      `;
    }

    // ---------- 移除收藏 ----------
    function removeFavorite(id) {
      favorites = favorites.filter(item => item.id !== id);
      renderFavorites();
      updateFooter();
    }

    // ---------- 加入购物车 ----------
    function addToCart(id) {
      const item = favorites.find(f => f.id === id);
      if (!item || item.unavailable) return;

      // 检查是否已添加
      const existing = cartItems.find(c => c.id === id);
      if (existing) {
        existing.qty += 1;
      } else {
        cartItems.push({
          id: item.id,
          name: item.name,
          price: item.price,
          img: item.img,
          qty: 1
        });
      }

      updateFooter();
      showToast('已加入购物车');

      // 通知父窗口更新购物车
      if (window.parent !== window) {
        window.parent.postMessage({ type: 'cartUpdated' }, '*');
      }
    }

    // ---------- 更新底部统计 ----------
    function updateFooter() {
      const totalCount = cartItems.reduce((sum, item) => sum + item.qty, 0);
      const totalPrice = cartItems.reduce((sum, item) => sum + item.price * item.qty, 0);

      document.getElementById('favCount').textContent = totalCount;
      document.getElementById('favTotalPrice').textContent = totalPrice.toFixed(1);
    }

    // ---------- 跳转购物车 ----------
    function goToCart() {
      if (window.parent !== window) {
        window.parent.postMessage({ type: 'switchPage', page: 'cart' }, '*');
      } else {
        location.href = '购物车.html';
      }
    }

    // ---------- 跳转商品详情 ----------
    function goToDetail(id) {
      if (window.parent !== window) {
        window.parent.postMessage({ type: 'navigate', id: id }, '*');
      } else {
        location.href = '商品详情页.html?id=' + id;
      }
    }

    // ---------- 返回 ----------
    function goBack() {
      if (window.parent !== window) {
        window.parent.postMessage({ type: 'navigateBack' }, '*');
      } else {
        history.back();
      }
    }

    // ---------- Toast ----------
    function showToast(msg) {
      var old = document.querySelector('.fav-toast');
      if (old) old.remove();
      var el = document.createElement('div');
      el.className = 'fav-toast';
      el.textContent = msg;
      document.body.appendChild(el);
      setTimeout(function() { el.remove(); }, 1500);
    }

    // ---------- Init ----------
    window.addEventListener('DOMContentLoaded', init);
  </script>
</body>
</html>
